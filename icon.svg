<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="76" ry="76" fill="url(#bg)"/>
  <text x="256" y="200" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-weight="800" font-size="160">KM</text>
  <!-- Truck body -->
  <rect x="128" y="270" width="170" height="100" rx="8" fill="rgba(255,255,255,0.9)"/>
  <!-- Truck cab -->
  <rect x="298" y="300" width="90" height="70" rx="8" fill="rgba(255,255,255,0.9)"/>
  <!-- Windshield -->
  <rect x="308" y="310" width="60" height="35" rx="4" fill="#1565C0" opacity="0.4"/>
  <!-- Wheels -->
  <circle cx="180" cy="385" r="22" fill="#0D47A1"/>
  <circle cx="180" cy="385" r="10" fill="#1565C0"/>
  <circle cx="345" cy="385" r="22" fill="#0D47A1"/>
  <circle cx="345" cy="385" r="10" fill="#1565C0"/>
  <!-- Arrow -->
  <line x1="160" y1="440" x2="360" y2="440" stroke="rgba(255,255,255,0.5)" stroke-width="8" stroke-linecap="round"/>
  <polyline points="340,425 360,440 340,455" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
